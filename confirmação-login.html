<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próxima Etapa</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #DCE8F8;
        }

        .container {
            width: 850px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        /* LADO ESQUERDO */

        .lado-esquerdo {
            width: 45%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .imagem-placeholder {
            width: 220px;
            height: 220px;
        
            border-radius: 20px;
            margin-bottom: 20px;

            display: flex;
            justify-content: center;
            align-items: center;

            color: #666;
            font-weight: bold;
            font-size: 20px;
        }
.logo{
    width: 220px;
            height: 220px;
}
        .titulo {
            font-size: 45px;
            color: #97c0f1;
            margin-bottom: 15px;
        }

        .texto {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
        }

        /* LADO DIREITO */

        .lado-direito {
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .box {
            text-align: center;
        }

        .box h1 {
            color: #333;
            margin-bottom: 15px;
        }

        .box p {
            color: #666;
            margin-bottom: 25px;
        }

        button {
            padding: 14px 25px;
            border: none;
            border-radius: 10px;
            background: #728db6;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #728db6;
        }

    </style>
</head>
<body>

    <div class="container">

        <!-- LADO ESQUERDO -->
        <div class="lado-esquerdo">

            <div class="imagem-placeholder">
                <img src="check.png" class="logo">
            </div>

            <h1 class="titulo">𝙉𝙖𝙢𝙞</h1>

            <p class="texto">
                Economize de forma inteligente, acompanhe seus gastos
                e transforme suas contas em oportunidades para guardar dinheiro.
            </p>

        </div>

        <!-- LADO DIREITO -->
        <div class="lado-direito">

            <div class="box">

                <h1>O seu cadastro foi concluído com sucesso!</h1>

                <p>
                    Agora é hora de explorar o site, vamos começar?
                </p>

                <button onclick="irParaInicio()">
                    Começar a economizar!
                </button>

            </div>

        </div>

    </div>

    <script>

        function irParaInicio() {
            window.location.href = "painel-principal.html";
        }

    </script>

</body>
</html>
